<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <title>Silent Shield - Women Safety SOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --surface-light: #1f2937;
      --border: #374151;
      --primary: #38bdf8;
      --danger: #ef4444;
      --accent: #10b981;
      --warning: #f59e0b;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* STARTUP - WITH FORCE HIDE */
    #startup {
      position: fixed; inset: 0; background: var(--bg); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #startup.hidden { opacity: 0; pointer-events: none; }
    .startup-icon {
      width: 88px; height: 88px; border-radius: 24px;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: white; margin-bottom: 1.5rem;
      animation: breathe 2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .startup-text { font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 0.25rem; }
    .startup-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; }
    .loader {
      width: 120px; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 4px; overflow: hidden; position: relative;
    }
    .loader-bar {
      position: absolute; left: -30%; width: 30%; height: 100%;
      background: var(--primary); border-radius: 4px;
      animation: sweep 1s linear infinite;
    }
    @keyframes sweep { to { left: 100%; } }

    /* MAIN LAYOUT */
    header {
      padding: 1rem; background: rgba(17,24,39,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; }
    .brand i { color: var(--primary); font-size: 1.3rem; }
    .brand span { font-weight: 700; font-size: 1.05rem; }
    .gps-status { font-size: 0.75rem; font-weight: 500; color: var(--warning); }
    .gps-status.locked { color: var(--accent); }

    main { padding: 1rem; max-width: 480px; margin: 0 auto; }

    /* SOS SECTION */
    .sos-zone {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 1.5rem; text-align: center;
      margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .sos-btn {
      width: 120px; height: 120px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--danger), #b91c1c);
      color: white; font-size: 1rem; font-weight: 800; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.3rem; box-shadow: 0 8px 25px rgba(239,68,68,0.4);
      transition: transform 0.15s; margin: 0 auto 1rem;
    }
    .sos-btn i { font-size: 2.2rem; }
    .sos-btn:disabled { filter: grayscale(0.8); cursor: not-allowed; }
    .sos-btn:active:not(:disabled) { transform: scale(0.95); }
    .sos-btn.holding { animation: pulse 0.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 15px rgba(239,68,68,0)} }

    .status-text { font-size: 0.85rem; color: var(--text-muted); min-height: 1.2rem; }

    /* QUICK ACTIONS */
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .q-btn {
      background: var(--surface-light); border: 1px solid var(--border);
      border-radius: 14px; padding: 1rem 0.5rem; text-align: center;
      color: var(--text); font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .q-btn i { font-size: 1.4rem; color: var(--primary); display: block; margin-bottom: 0.4rem; }
    .q-btn.danger i { color: var(--danger); }
    .q-btn.success i { color: var(--accent); }
    .q-btn:active { transform: scale(0.96); background: var(--border); }

    /* MAP */
    .map-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 1rem;
    }
    #map { height: 280px; width: 100%; background: #1f2937; }
    .map-info {
      padding: 0.6rem 0.8rem; background: rgba(17,24,39,0.8);
      font-size: 0.78rem; color: var(--text-muted); display: flex;
      align-items: center; justify-content: space-between;
    }
    .map-info i { color: var(--danger); margin-right: 0.4rem; }

    /* CONTACTS */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem;
    }
    .card h3 { font-size: 1rem; margin-bottom: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
    .card h3 i { color: var(--primary); }
    .input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 0.85rem; border-radius: 10px;
      margin-bottom: 0.6rem; font-size: 0.9rem;
    }
    .input:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%; padding: 0.85rem; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { opacity: 0.9; }

    /* MODAL */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px); z-index: 9000; display: none;
      align-items: flex-end; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--surface); width: 100%; max-width: 400px;
      border-radius: 24px 24px 0 0; padding: 1.5rem;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-header h3 { font-size: 1.1rem; }
    .modal-close {
      background: var(--surface-light); border: none; width: 32px; height: 32px;
      border-radius: 50%; color: var(--text); cursor: pointer;
    }
    .select, .textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 0.85rem; border-radius: 10px;
      margin-bottom: 0.75rem; font-family: inherit;
    }
    .textarea { resize: none; }
    .btn-row { display: flex; gap: 0.75rem; }
    .btn-secondary { background: var(--surface-light); color: var(--text); flex: 1; padding: 0.85rem; border: none; border-radius: 10px; cursor: pointer; }
    .btn-danger { background: var(--danger); color: white; flex: 1; padding: 0.85rem; border: none; border-radius: 10px; cursor: pointer; }

    /* MARKERS */
    .danger-marker { background: var(--danger); width: 14px; height: 14px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 2px rgba(239,68,68,0.3); }
    .user-marker { background: var(--accent); width: 14px; height: 14px; border-radius: 50%; border: 3px solid white; }

    /* FAKE CALL */
    .call-screen {
      position: fixed; inset: 0; background: #000; z-index: 9500;
      display: none; flex-direction: column; align-items: center;
      justify-content: space-between; padding: 30% 2rem 15%;
    }
    .call-screen.active { display: flex; }
    .call-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, var(--primary));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: white;
    }
    .call-name { font-size: 1.8rem; font-weight: 700; color: white; text-align: center; margin-top: 1.5rem; }
    .call-status { color: var(--text-muted); margin-top: 0.5rem; }
    .call-buttons { display: flex; gap: 3rem; margin-bottom: 10vh; }
    .c-btn {
      width: 64px; height: 64px; border-radius: 50%; border: none;
      color: white; font-size: 1.5rem; cursor: pointer;
    }
    .c-btn.decline { background: var(--danger); }
    .c-btn.accept { background: var(--accent); }

    footer { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.75rem; }
  </style>
</head>
<body>
  <!-- STARTUP SCREEN -->
  <div id="startup">
    <div class="startup-icon"><i class="fas fa-shield-halved"></i></div>
    <div class="startup-text">Silent Shield</div>
    <div class="startup-sub">Women Safety SOS</div>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>

  <header>
    <div class="brand"><i class="fas fa-shield-halved"></i><span>Silent Shield</span></div>
    <div class="gps-status" id="gpsStatus"><i class="fas fa-spinner fa-spin"></i> Locating...</div>
  </header>

  <main>
    <section class="sos-zone">
      <button class="sos-btn" id="sosBtn" disabled>
        <i class="fas fa-bell"></i>
        <span>SOS</span>
      </button>
      <div class="status-text" id="statusText">Initializing GPS...</div>
    </section>

    <div class="quick-grid">
      <button class="q-btn" id="btnAlarm"><i class="fas fa-bullhorn"></i>Alarm</button>
      <button class="q-btn" id="btnCall"><i class="fas fa-phone"></i>Fake Call</button>
      <button class="q-btn success" id="btnShare"><i class="fas fa-location-arrow"></i>Share Location</button>
      <button class="q-btn danger" id="btnReport"><i class="fas fa-flag"></i>Report</button>
    </div>

    <div class="map-container">
      <div id="map"></div>
      <div class="map-info">
        <span><i class="fas fa-circle-exclamation"></i> Red pins = Unsafe zones</span>
        <span id="coords">--.----, --.----</span>
      </div>
    </div>

    <div class="card">
      <h3><i class="fas fa-user-shield"></i> Emergency Contacts</h3>
      <input type="tel" id="contact1" class="input" placeholder="Contact 1 (e.g., +1 555 0198)">
      <input type="tel" id="contact2" class="input" placeholder="Contact 2 (e.g., +44 7911 123456)">
      <button class="btn btn-primary" id="saveContacts">Save Contacts</button>
    </div>
  </main>

  <!-- REPORT MODAL -->
  <div class="modal" id="reportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-triangle-exclamation" style="color:var(--danger)"></i> Report Hazard</h3>
        <button class="modal-close" onclick="closeModal('reportModal')"><i class="fas fa-xmark"></i></button>
      </div>
      <select class="select" id="rType">
        <option>Harassment / Stalking</option>
        <option>Poor Lighting</option>
        <option>Assault / Robbery</option>
        <option>Suspicious Activity</option>
        <option>Other</option>
      </select>
      <textarea class="textarea" id="rNote" rows="3" placeholder="Details (optional)"></textarea>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('reportModal')">Cancel</button>
        <button class="btn-danger" id="submitReport">Submit</button>
      </div>
    </div>
  </div>

  <!-- FAKE CALL SCREEN -->
  <div class="call-screen" id="fakeCall">
    <div class="call-avatar"><i class="fas fa-user"></i></div>
    <div>
      <div class="call-name">Dad</div>
      <div class="call-status" id="callStatus">Incoming call...</div>
    </div>
    <div class="call-buttons">
      <button class="c-btn decline" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
      <button class="c-btn accept" onclick="acceptCall()"><i class="fas fa-phone"></i></button>
    </div>
  </div>

  <footer>
    <p><strong>Silent Shield v2.0</strong> • Client-side only</p>
    <p>Not a replacement for emergency services</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Global State
    let map, userPos = null, locLocked = false;
    let reports = JSON.parse(localStorage.getItem('ss_reports') || '[]');
    let contacts = JSON.parse(localStorage.getItem('ss_contacts') || '[]');
    let callTimer = null, callSec = 0, isCallActive = false;

    // DOM Elements
    const $ = id => document.getElementById(id);
    const gpsEl = $('gpsStatus'), sosBtn = $('sosBtn'), statusText = $('statusText');

    // FORCE HIDE STARTUP after 2.5 seconds max
    function hideStartup() {
      const startup = $('startup');
      if(!startup.classList.contains('hidden')) {
        startup.classList.add('hidden');
        setTimeout(() => startup.style.display = 'none', 500);
      }
    }

    // Initialize Map with error handling
    function initMap() {
      try {
        if(map) return;
        
        // Default to Delhi if no location
        map = L.map('map', { zoomControl: false }).setView([28.6139, 77.209], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 19, subdomains: 'abcd'
        }).addTo(map);

        // Add demo reports if none exist
        if(reports.length === 0) {
          reports = [
            {lat: 28.615, lon: 77.21, type: 'Poor Lighting', time: Date.now() - 86400000},
            {lat: 28.608, lon: 77.23, type: 'Harassment', time: Date.now() - 172800000}
          ];
          localStorage.setItem('ss_reports', JSON.stringify(reports));
        }

        renderMarkers();
        hideStartup(); // Hide startup once map is ready
      } catch(err) {
        console.error('Map error:', err);
        $('map').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted)">Map unavailable</div>';
        hideStartup();
      }
    }

    function renderMarkers() {
      if(!map) return;
      
      // Clear existing
      map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

      const dangerIcon = L.divIcon({className: 'danger-marker', iconSize: [16, 16]});
      const userIcon = L.divIcon({className: 'user-marker', iconSize: [14, 14]});

      // Add hazard markers
      reports.forEach(r => {
        L.marker([r.lat, r.lon], {icon: dangerIcon})
          .addTo(map)
          .bindPopup(`<b style="color:#ef4444">⚠️ ${r.type}</b>`);
      });

      // Add user marker
      if(userPos) {
        L.marker([userPos.lat, userPos.lon], {icon: userIcon})
          .addTo(map).bindPopup('📍 You');
        map.setView([userPos.lat, userPos.lon], 15);
      }
    }

    // GPS Tracking
    function trackLocation() {
      if(!navigator.geolocation) {
        statusText.textContent = 'GPS not supported';
        gpsEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> No GPS';
        initMap();
        return;
      }

      navigator.geolocation.watchPosition(
        pos => {
          userPos = {
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            acc: pos.coords.accuracy
          };
          
          $('coords').textContent = `${userPos.lat.toFixed(4)}, ${userPos.lon.toFixed(4)}`;
          
          if(!locLocked) {
            locLocked = true;
            gpsEl.classList.add('locked');
            gpsEl.innerHTML = '<i class="fas fa-check-circle"></i> GPS Locked';
            statusText.textContent = 'Tap & hold SOS to alert';
            sosBtn.disabled = false;
            renderMarkers();
          }
        },
        err => {
          console.warn('GPS error:', err);
          statusText.textContent = 'Location access denied';
          gpsEl.innerHTML = '<i class="fas fa-times-circle"></i> Denied';
          initMap(); // Still init map even without GPS
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    // SOS Handler
    let holdTimer;
    const startHold = e => {
      e.preventDefault();
      if(sosBtn.disabled) return;
      sosBtn.classList.add('holding');
      statusText.textContent = 'Hold 1.5s to confirm...';
      holdTimer = setTimeout(triggerSOS, 1500);
    };

    const endHold = () => {
      if(sosBtn.disabled) return;
      clearTimeout(holdTimer);
      sosBtn.classList.remove('holding');
      if(locLocked) statusText.textContent = 'Tap & hold SOS to alert';
    };

    sosBtn.addEventListener('mousedown', startHold);
    sosBtn.addEventListener('touchstart', startHold, {passive: false});
    sosBtn.addEventListener('mouseup', endHold);
    sosBtn.addEventListener('mouseleave', endHold);
    sosBtn.addEventListener('touchend', endHold);

    function triggerSOS() {
      const msg = `🚨 SILENT SHIELD SOS\nI need help!\n📍 https://maps.google.com/?q=${userPos?.lat||0},${userPos?.lon||0}\n⏰ ${new Date().toLocaleString()}`;
      const phones = contacts.filter(c => c).join(',');
      
      if(phones) {
        window.location.href = `sms:${phones}?body=${encodeURIComponent(msg)}`;
      } else {
        window.location.href = `mailto:?subject=🚨%20SOS&body=${encodeURIComponent(msg)}`;
      }
      
      statusText.textContent = 'Alert sent!';
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
    }

    // Quick Actions
    $('btnAlarm').addEventListener('click', () => {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 1);
      if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
      statusText.textContent = '🔊 Alarm active';
    });

    $('btnShare').addEventListener('click', () => {
      if(!userPos) return alert('Waiting for GPS...');
      const link = `https://maps.google.com/?q=${userPos.lat},${userPos.lon}`;
      if(navigator.share) {
        navigator.share({title: 'My Location', url: link}).catch(()=>{});
      } else {
        prompt('Copy link:', link);
      }
    });

    $('btnReport').addEventListener('click', () => {
      if(!userPos) return alert('Enable location first');
      $('reportModal').classList.add('active');
    });

    $('submitReport').addEventListener('click', () => {
      const type = $('rType').value;
      const note = $('rNote').value;
      reports.push({lat: userPos.lat, lon: userPos.lon, type, note, time: Date.now()});
      localStorage.setItem('ss_reports', JSON.stringify(reports));
      renderMarkers();
      closeModal('reportModal');
      statusText.textContent = '✅ Report submitted';
    });

    // Contacts
    $('saveContacts').addEventListener('click', () => {
      const c1 = $('contact1').value.trim();
      const c2 = $('contact2').value.trim();
      contacts = [c1, c2].filter(Boolean);
      localStorage.setItem('ss_contacts', JSON.stringify(contacts));
      statusText.textContent = `✅ ${contacts.length} contacts saved`;
    });

    // Fake Call
    $('btnCall').addEventListener('click', () => {
      if(isCallActive) return;
      isCallActive = true;
      callSec = 0;
      $('fakeCall').classList.add('active');
      callTimer = setInterval(() => {
        callSec++;
        const m = Math.floor(callSec/60).toString().padStart(2,'0');
        const s = (callSec%60).toString().padStart(2,'0');
        $('callStatus').textContent = `${m}:${s} • Connected`;
      }, 1000);
      setTimeout(endCall, 15000);
    });

    function acceptCall() {
      $('callStatus').textContent = '00:00 • Connected';
      setTimeout(endCall, 8000);
    }

    function endCall() {
      $('fakeCall').classList.remove('active');
      clearInterval(callTimer);
      isCallActive = false;
    }

    // Modal
    window.closeModal = id => $(id).classList.remove('active');

    // INIT - with timeout fallback
    window.addEventListener('load', () => {
      trackLocation();
      initMap();
      // FORCE hide startup after 2.5 seconds no matter what
      setTimeout(hideStartup, 2500);
    });

    // Load saved contacts
    if(contacts.length) {
      $('contact1').value = contacts[0] || '';
      $('contact2').value = contacts[1] || '';
    }
  </script>
</body>
</html>
